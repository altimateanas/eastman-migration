version: 2

models:
  # =============================================================================
  # DIMENSIONS
  # =============================================================================
  - name: dim_date
    description: |
      Date dimension spanning 2022-01-01 to 2026-12-31.
      Migrated from: TRANSFORMED.usp_LoadDimDate
      Includes calendar attributes and fiscal calendar (July 1 fiscal year start).
      One row per calendar day (1,827 rows expected).
    columns:
      - name: DateKey
        description: "Integer date key in YYYYMMDD format (e.g., 20220101)"
        tests:
          - unique
          - not_null
      - name: FullDate
        description: "Full calendar date"
        tests:
          - unique
          - not_null
      - name: DayOfWeek
        description: "Day of week number (1=Sunday through 7=Saturday)"
      - name: DayName
        description: "Day name (Monday, Tuesday, etc.)"
      - name: DayOfMonth
        description: "Day number within the month (1-31)"
      - name: DayOfYear
        description: "Day number within the year (1-366)"
      - name: WeekOfYear
        description: "Week number within the year"
      - name: MonthNumber
        description: "Calendar month number (1-12)"
      - name: MonthName
        description: "Month name (January, February, etc.)"
      - name: Quarter
        description: "Calendar quarter (1-4)"
      - name: QuarterName
        description: "Quarter label (Q1, Q2, Q3, Q4)"
      - name: Year
        description: "Calendar year"
      - name: IsWeekend
        description: "Weekend flag: 1 for Saturday/Sunday, 0 for weekdays"
      - name: FiscalMonth
        description: "Fiscal month (1-12, where July=1)"
      - name: FiscalQuarter
        description: "Fiscal quarter (1-4, where Q1=July-Sept)"
      - name: FiscalYear
        description: "Fiscal year (e.g., FY2023 = July 2022 - June 2023)"

  - name: dim_customer
    description: |
      Customer dimension with derived FullName and AgeGroup.
      Migrated from: TRANSFORMED.usp_LoadDimCustomer
      One row per customer (35 rows expected from seed data).
    columns:
      - name: CustomerID
        description: "Natural key from source system"
        tests:
          - unique
          - not_null
      - name: FullName
        description: "Concatenated first and last name"
        tests:
          - not_null
      - name: Email
        description: "Customer email address"
      - name: Phone
        description: "Customer phone number"
      - name: DateOfBirth
        description: "Customer date of birth"
      - name: Gender
        description: "Customer gender"
      - name: City
        description: "Customer city"
      - name: State
        description: "Customer state/province"
      - name: Country
        description: "Customer country"
      - name: PostalCode
        description: "Customer postal/zip code"
      - name: CustomerSegment
        description: "Customer segment (Regular/Premium/VIP)"
      - name: AgeGroup
        description: "Age group bucket (18-24, 25-34, 35-44, 45-54, 55+)"
        tests:
          - not_null
          - accepted_values:
              values: ["18-24", "25-34", "35-44", "45-54", "55+"]
      - name: RegistrationDate
        description: "Date when customer registered"
      - name: IsActive
        description: "Whether the customer account is active"

  - name: dim_product
    description: |
      Product dimension denormalized with category and supplier names.
      Migrated from: TRANSFORMED.usp_LoadDimProduct
      One row per product with matching category and supplier (30 rows expected).
    columns:
      - name: ProductID
        description: "Natural key from source system"
        tests:
          - unique
          - not_null
      - name: ProductName
        description: "Product name"
        tests:
          - not_null
      - name: SKU
        description: "Stock keeping unit code"
      - name: CategoryName
        description: "Product category name (from Categories table)"
        tests:
          - not_null
      - name: SupplierName
        description: "Supplier company name (from Suppliers table)"
        tests:
          - not_null
      - name: UnitPrice
        description: "Current selling price"
      - name: CostPrice
        description: "Product cost price"
      - name: ProfitMargin
        description: "Profit margin percentage: ((UnitPrice - CostPrice) / UnitPrice) * 100"
      - name: IsDiscontinued
        description: "Whether the product is discontinued (0/1)"

  - name: dim_store
    description: |
      Store dimension - direct passthrough from source.
      Migrated from: TRANSFORMED.usp_LoadDimStore
      One row per store (5 rows expected).
    columns:
      - name: StoreID
        description: "Natural key from source system"
        tests:
          - unique
          - not_null
      - name: StoreName
        description: "Store name"
        tests:
          - not_null
      - name: StoreType
        description: "Type of store (Flagship/Standard/Express/Warehouse)"
      - name: City
        description: "Store city"
      - name: State
        description: "Store state/province"
      - name: Country
        description: "Store country"
      - name: PostalCode
        description: "Store postal code"
      - name: ManagerName
        description: "Name of the store manager"
      - name: OpenDate
        description: "Date the store opened"
      - name: IsActive
        description: "Whether the store is currently active"

  - name: dim_employee
    description: |
      Employee dimension denormalized with store name.
      Migrated from: TRANSFORMED.usp_LoadDimEmployee
      One row per employee with valid store assignment.
    columns:
      - name: EmployeeID
        description: "Natural key from source system"
        tests:
          - unique
          - not_null
      - name: FullName
        description: "Concatenated first and last name"
        tests:
          - not_null
      - name: Email
        description: "Employee email address"
      - name: JobTitle
        description: "Employee job title"
      - name: Department
        description: "Department the employee belongs to"
      - name: StoreName
        description: "Name of the store where employee works (from Stores table)"
        tests:
          - not_null
      - name: HireDate
        description: "Date the employee was hired"
      - name: YearsOfService
        description: "Approximate years of service (DATEDIFF year from HireDate to current date)"
      - name: IsActive
        description: "Whether the employee is currently active"

  - name: dim_payment_method
    description: |
      Payment method reference dimension.
      Migrated from: TRANSFORMED.usp_LoadDimPaymentMethod
      One row per unique payment method (derived from payment transactions).
    columns:
      - name: PaymentMethod
        description: "Payment method name (CreditCard, DebitCard, Cash, etc.)"
        tests:
          - unique
          - not_null
      - name: PaymentCategory
        description: "Payment category grouping (Card, Physical, Digital, Transfer, Other)"
        tests:
          - not_null
          - accepted_values:
              values: ["Card", "Physical", "Digital", "Transfer", "Other"]

  # =============================================================================
  # FACTS
  # =============================================================================
  - name: fact_sales
    description: |
      Central sales fact table at order line item grain.
      Migrated from: TRANSFORMED.usp_LoadFactSales
      One row per order line item (150 rows expected from seed data).
      Includes surrogate key lookups, cost/profit calculations, and proportional allocation.
    columns:
      - name: OrderID
        description: "Natural key of the parent order"
        tests:
          - not_null
      - name: OrderItemID
        description: "Natural key of the order line item (grain of fact table)"
        tests:
          - unique
          - not_null
      - name: OrderDateKey
        description: "Integer date key (YYYYMMDD) linking to dim_date"
        tests:
          - not_null
      - name: CustomerKey
        description: "Customer dimension key"
        tests:
          - not_null
      - name: ProductKey
        description: "Product dimension key"
        tests:
          - not_null
      - name: StoreKey
        description: "Store dimension key"
        tests:
          - not_null
      - name: EmployeeKey
        description: "Employee dimension key"
        tests:
          - not_null
      - name: PaymentMethodKey
        description: "Payment method dimension key (may be NULL if no payment)"
      - name: OrderChannel
        description: "Sales channel (Online/InStore)"
      - name: OrderStatus
        description: "Current order status"
      - name: Quantity
        description: "Quantity ordered on this line"
      - name: UnitPrice
        description: "Unit selling price"
      - name: CostPrice
        description: "Unit cost price (from Products)"
      - name: DiscountPercent
        description: "Discount percentage applied to this line"
      - name: LineTotal
        description: "Total line amount after discount"
      - name: LineCost
        description: "Total cost for this line (Quantity * CostPrice)"
      - name: LineProfit
        description: "Line profit (LineTotal - LineCost)"
      - name: ShippingCost
        description: "Proportionally allocated shipping cost"
      - name: PaymentAmount
        description: "Proportionally allocated payment amount"

  - name: fact_daily_inventory
    description: |
      Daily inventory snapshot for active products.
      Migrated from: TRANSFORMED.usp_LoadFactDailyInventory
      One row per active (non-discontinued) product per snapshot day.
    columns:
      - name: SnapshotDateKey
        description: "Integer date key (YYYYMMDD) for the snapshot date"
        tests:
          - not_null
      - name: ProductKey
        description: "Product dimension key"
        tests:
          - not_null
      - name: UnitsInStock
        description: "Current units in stock"
      - name: ReorderLevel
        description: "Minimum stock level before reorder"
      - name: StockStatus
        description: "Stock health classification (Out of Stock / Low Stock / In Stock)"
        tests:
          - not_null
          - accepted_values:
              values: ["Out of Stock", "Low Stock", "In Stock"]
      - name: StockValue
        description: "Inventory value at cost (UnitsInStock * CostPrice)"
