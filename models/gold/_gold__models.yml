version: 2

models:
  # ============================================================
  # DIMENSIONS
  # ============================================================

  - name: dim_customer
    description: >
      Customer dimension table for analytical reporting.
      One row per customer. Includes surrogate key, concatenated full name,
      and age group derived from date of birth.
      Mirrors TRANSFORMED.DimCustomer from MS SQL Server.
    columns:
      - name: customer_key
        description: Surrogate key — SHA-256 hash of customer_id.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Natural key from source system.
        tests:
          - unique
          - not_null
      - name: full_name
        description: Concatenated first and last name.
        tests:
          - not_null
      - name: email
        description: Customer's email address (lower-cased).
      - name: phone
        description: Customer's phone number.
      - name: date_of_birth
        description: Customer's date of birth.
      - name: gender
        description: Customer's gender.
      - name: city
        description: City of residence.
      - name: state
        description: State of residence.
      - name: country
        description: Country of residence.
      - name: postal_code
        description: Postal/ZIP code.
      - name: customer_segment
        description: Customer segment classification from source system.
      - name: age_group
        description: Derived age group bucket (18-24, 25-34, 35-44, 45-54, 55+).
        tests:
          - accepted_values:
              arguments:
                values: ["18-24", "25-34", "35-44", "45-54", "55+"]
      - name: registration_date
        description: Date the customer registered.
      - name: is_active
        description: 1 = active customer, 0 = inactive.
      - name: dw_created_at
        description: Timestamp when this record was loaded to the data warehouse.
      - name: dw_updated_at
        description: Timestamp when this record was last updated in the data warehouse.

  - name: dim_date
    description: >
      Date dimension covering calendar dates from 2022-01-01 to 2026-12-31.
      Supports both standard calendar and fiscal year attributes
      (fiscal year begins on July 1).
      Generated via dbt_utils.date_spine — no source table dependency.
      Mirrors TRANSFORMED.DimDate from MS SQL Server.
    columns:
      - name: date_key
        description: Integer date key in YYYYMMDD format (e.g. 20240101).
        tests:
          - unique
          - not_null
      - name: full_date
        description: The actual calendar date.
        tests:
          - unique
          - not_null
      - name: day_of_week
        description: Day of week number (1=Sunday, 7=Saturday on SQL Server).
      - name: day_name
        description: Full day name (e.g. Monday, Tuesday).
      - name: day_of_month
        description: Day number within the month (1–31).
      - name: day_of_year
        description: Day number within the year (1–366).
      - name: week_of_year
        description: ISO week number within the year.
      - name: month_number
        description: Month number (1–12).
      - name: month_name
        description: Full month name (e.g. January, February).
      - name: quarter
        description: Calendar quarter (1–4).
      - name: quarter_name
        description: Quarter label (e.g. Q1, Q2, Q3, Q4).
      - name: year
        description: Calendar year (e.g. 2024).
      - name: is_weekend
        description: 1 = weekend day (Saturday or Sunday), 0 = weekday.
      - name: fiscal_month
        description: Fiscal month number (1–12, where 1 = July).
      - name: fiscal_quarter
        description: Fiscal quarter (1–4, where Q1 starts July 1).
      - name: fiscal_year
        description: Fiscal year (e.g. FY2025 starts July 2024).

  - name: dim_employee
    description: >
      Employee dimension enriched with store name and years of service.
      One row per employee.
      Mirrors TRANSFORMED.DimEmployee from MS SQL Server.
    columns:
      - name: employee_key
        description: Surrogate key — SHA-256 hash of employee_id.
        tests:
          - unique
          - not_null
      - name: employee_id
        description: Natural key from source system.
        tests:
          - unique
          - not_null
      - name: full_name
        description: Concatenated first and last name.
        tests:
          - not_null
      - name: email
        description: Employee's email address (lower-cased).
      - name: job_title
        description: Employee's job title.
      - name: department
        description: Department the employee belongs to.
      - name: store_name
        description: Name of the store the employee is assigned to.
      - name: hire_date
        description: Date the employee was hired.
      - name: years_of_service
        description: Number of full years between hire date and today.
      - name: is_active
        description: 1 = active employee, 0 = inactive.
      - name: dw_created_at
        description: Timestamp when this record was loaded to the data warehouse.
      - name: dw_updated_at
        description: Timestamp when this record was last updated in the data warehouse.

  - name: dim_payment_method
    description: >
      Distinct payment methods with a higher-level payment category grouping.
      One row per unique payment method value.
      Mirrors TRANSFORMED.DimPaymentMethod from MS SQL Server.
    columns:
      - name: payment_method_key
        description: Surrogate key — SHA-256 hash of payment_method.
        tests:
          - unique
          - not_null
      - name: payment_method
        description: Payment method name (e.g. CreditCard, Cash, DigitalWallet).
        tests:
          - unique
          - not_null
      - name: payment_category
        description: Higher-level category (Card, Physical, Digital, Transfer, Other).
        tests:
          - accepted_values:
              arguments:
                values: ["Card", "Physical", "Digital", "Transfer", "Other"]
      - name: dw_created_at
        description: Timestamp when this record was loaded to the data warehouse.
      - name: dw_updated_at
        description: Timestamp when this record was last updated in the data warehouse.

  - name: dim_product
    description: >
      Product dimension enriched with category name, supplier name, and
      calculated gross profit margin percentage.
      One row per product.
      Mirrors TRANSFORMED.DimProduct from MS SQL Server.
    columns:
      - name: product_key
        description: Surrogate key — SHA-256 hash of product_id.
        tests:
          - unique
          - not_null
      - name: product_id
        description: Natural key from source system.
        tests:
          - unique
          - not_null
      - name: product_name
        description: Display name of the product.
        tests:
          - not_null
      - name: sku
        description: Stock Keeping Unit identifier.
      - name: category_name
        description: Product category name (joined from Categories).
      - name: supplier_name
        description: Supplier company name (joined from Suppliers).
      - name: unit_price
        description: Current selling price per unit.
      - name: cost_price
        description: Cost of goods per unit.
      - name: profit_margin
        description: >
          Gross profit margin as a percentage: ((unit_price - cost_price) / unit_price) * 100.
          Rounded to 2 decimal places. 0 when unit_price = 0.
      - name: is_discontinued
        description: 1 = discontinued product, 0 = active.
      - name: dw_created_at
        description: Timestamp when this record was loaded to the data warehouse.
      - name: dw_updated_at
        description: Timestamp when this record was last updated in the data warehouse.

  - name: dim_store
    description: >
      Store dimension for analytical reporting.
      One row per store.
      Mirrors TRANSFORMED.DimStore from MS SQL Server.
    columns:
      - name: store_key
        description: Surrogate key — SHA-256 hash of store_id.
        tests:
          - unique
          - not_null
      - name: store_id
        description: Natural key from source system.
        tests:
          - unique
          - not_null
      - name: store_name
        description: Display name of the store.
        tests:
          - not_null
      - name: store_type
        description: Type of store (e.g. Flagship, Outlet, Online).
      - name: city
        description: City where the store is located.
      - name: state
        description: State where the store is located.
      - name: country
        description: Country where the store is located.
      - name: postal_code
        description: Postal/ZIP code of the store.
      - name: manager_name
        description: Full name of the store manager.
      - name: open_date
        description: Date the store opened.
      - name: is_active
        description: 1 = active store, 0 = inactive.
      - name: dw_created_at
        description: Timestamp when this record was loaded to the data warehouse.
      - name: dw_updated_at
        description: Timestamp when this record was last updated in the data warehouse.

  # ============================================================
  # FACTS
  # ============================================================

  - name: fct_sales
    description: >
      Sales fact table at order-line-item grain. Joins order items to all
      six dimensions and allocates shipping cost and payment amount
      proportionally across line items by their share of the order total.
      Mirrors TRANSFORMED.FactSales from MS SQL Server.
    columns:
      - name: order_id
        description: Natural key of the parent order.
        tests:
          - not_null
      - name: order_item_id
        description: Natural key of the order line item. Composite PK with order_id.
        tests:
          - not_null
      - name: order_date_key
        description: Date key (YYYYMMDD integer) — FK to dim_date.date_key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: customer_key
        description: Surrogate key — FK to dim_customer.customer_key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: product_key
        description: Surrogate key — FK to dim_product.product_key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key
      - name: store_key
        description: Surrogate key — FK to dim_store.store_key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_store')
                field: store_key
      - name: employee_key
        description: Surrogate key — FK to dim_employee.employee_key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_employee')
                field: employee_key
      - name: payment_method_key
        description: Surrogate key — FK to dim_payment_method.payment_method_key. NULL if no payment recorded.
      - name: order_channel
        description: Channel through which the order was placed.
      - name: order_status
        description: Current status of the order.
      - name: quantity
        description: Number of units ordered on this line item.
      - name: unit_price
        description: Selling price per unit at time of order.
      - name: cost_price
        description: Cost of goods per unit from the product master.
      - name: discount_percent
        description: Discount percentage applied to this line item.
      - name: line_total
        description: Total revenue for this line item after discount.
      - name: line_cost
        description: Total cost for this line item (quantity × cost_price).
      - name: line_profit
        description: Gross profit for this line item (line_total − line_cost).
      - name: shipping_cost
        description: >
          Shipping cost allocated to this line item proportional to its
          share of the total order revenue.
      - name: payment_amount
        description: >
          Payment amount allocated to this line item proportional to its
          share of the total order revenue.
      - name: dw_created_at
        description: Timestamp when this record was loaded to the data warehouse.

  - name: fct_daily_inventory
    description: >
      Daily inventory snapshot for all active (non-discontinued) products.
      One row per product per snapshot date.
      Snapshot date is derived from GETDATE() at time of dbt run.
      Run daily to accumulate historical inventory snapshots.
      Mirrors TRANSFORMED.FactDailyInventory from MS SQL Server.
    columns:
      - name: snapshot_date_key
        description: Date key (YYYYMMDD integer) for the snapshot date — FK to dim_date.date_key.
        tests:
          - not_null
      - name: product_key
        description: Surrogate key — FK to dim_product.product_key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key
      - name: units_in_stock
        description: Current stock quantity at time of snapshot.
      - name: reorder_level
        description: Minimum stock level that triggers a reorder.
      - name: stock_status
        description: >
          Inventory status: 'Out of Stock' (0 units), 'Low Stock' (≤ reorder level),
          or 'In Stock'.
        tests:
          - accepted_values:
              arguments:
                values: ["Out of Stock", "Low Stock", "In Stock"]
      - name: stock_value
        description: Total inventory value at cost (units_in_stock × cost_price).
      - name: dw_created_at
        description: Timestamp when this snapshot record was loaded to the data warehouse.
