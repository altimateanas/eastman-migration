version: 2

sources:
  - name: raw
    description: "Raw source tables loaded from MS SQL Server RetailDW database via seeds"
    schema: raw
    tables:
      - name: seed_raw_categories
        description: "Product categories reference table"
        columns:
          - name: CategoryID
            description: "Unique identifier for the category"
            tests:
              - unique
              - not_null
          - name: CategoryName
            description: "Name of the product category"
          - name: Description
            description: "Category description"
          - name: IsActive
            description: "Whether the category is active (1) or inactive (0)"

      - name: seed_raw_customers
        description: "Customer master data"
        columns:
          - name: CustomerID
            description: "Unique identifier for the customer"
            tests:
              - unique
              - not_null
          - name: FirstName
            description: "Customer first name"
          - name: LastName
            description: "Customer last name"
          - name: Email
            description: "Customer email address"
          - name: Phone
            description: "Customer phone number"
          - name: DateOfBirth
            description: "Customer date of birth"
          - name: Gender
            description: "Customer gender"
          - name: Address
            description: "Customer street address"
          - name: City
            description: "Customer city"
          - name: State
            description: "Customer state/province"
          - name: Country
            description: "Customer country"
          - name: PostalCode
            description: "Customer postal/zip code"
          - name: CustomerSegment
            description: "Customer segment classification (Regular/Premium/VIP)"
          - name: RegistrationDate
            description: "Date when customer registered"
          - name: IsActive
            description: "Whether the customer account is active"

      - name: seed_raw_employees
        description: "Employee master data"
        columns:
          - name: EmployeeID
            description: "Unique identifier for the employee"
            tests:
              - unique
              - not_null
          - name: FirstName
            description: "Employee first name"
          - name: LastName
            description: "Employee last name"
          - name: Email
            description: "Employee email address"
          - name: Phone
            description: "Employee phone number"
          - name: HireDate
            description: "Date the employee was hired"
          - name: JobTitle
            description: "Employee job title"
          - name: Department
            description: "Department the employee belongs to"
          - name: StoreID
            description: "Foreign key to the store where the employee works"
          - name: ManagerID
            description: "Foreign key to the employee's manager (self-referencing)"
          - name: Salary
            description: "Employee salary"
          - name: IsActive
            description: "Whether the employee is currently active"

      - name: seed_raw_orders
        description: "Sales order headers"
        columns:
          - name: OrderID
            description: "Unique identifier for the order"
            tests:
              - unique
              - not_null
          - name: CustomerID
            description: "Foreign key to the customer who placed the order"
          - name: StoreID
            description: "Foreign key to the store where the order was placed"
          - name: EmployeeID
            description: "Foreign key to the employee who processed the order"
          - name: OrderDate
            description: "Date the order was placed"
          - name: RequiredDate
            description: "Requested delivery date"
          - name: OrderStatus
            description: "Current order status"
          - name: OrderChannel
            description: "Sales channel (Online/InStore)"
          - name: Notes
            description: "Additional order notes"

      - name: seed_raw_order_items
        description: "Sales order line items (detail level)"
        columns:
          - name: OrderItemID
            description: "Unique identifier for the order line item"
            tests:
              - unique
              - not_null
          - name: OrderID
            description: "Foreign key to the parent order"
          - name: ProductID
            description: "Foreign key to the product"
          - name: Quantity
            description: "Quantity ordered"
          - name: UnitPrice
            description: "Unit price at the time of sale"
          - name: Discount
            description: "Discount percentage applied"
          - name: LineTotal
            description: "Total line amount after discount"

      - name: seed_raw_payments
        description: "Payment transactions for orders"
        columns:
          - name: PaymentID
            description: "Unique identifier for the payment"
            tests:
              - unique
              - not_null
          - name: OrderID
            description: "Foreign key to the order being paid"
          - name: PaymentDate
            description: "Date the payment was processed"
          - name: PaymentMethod
            description: "Payment method used (CreditCard, DebitCard, Cash, etc.)"
          - name: Amount
            description: "Payment amount"
          - name: Currency
            description: "Payment currency"
          - name: PaymentStatus
            description: "Status of the payment (Completed/Pending/Failed)"
          - name: TransactionRef
            description: "External transaction reference"

      - name: seed_raw_products
        description: "Product master data"
        columns:
          - name: ProductID
            description: "Unique identifier for the product"
            tests:
              - unique
              - not_null
          - name: ProductName
            description: "Product name"
          - name: CategoryID
            description: "Foreign key to the category"
          - name: SupplierID
            description: "Foreign key to the supplier"
          - name: SKU
            description: "Stock keeping unit code"
          - name: UnitPrice
            description: "Current selling price"
          - name: CostPrice
            description: "Product cost price"
          - name: UnitsInStock
            description: "Current inventory quantity"
          - name: ReorderLevel
            description: "Minimum stock level before reorder"
          - name: IsDiscontinued
            description: "Whether the product is discontinued (0/1)"

      - name: seed_raw_shipments
        description: "Shipment tracking for orders"
        columns:
          - name: ShipmentID
            description: "Unique identifier for the shipment"
            tests:
              - unique
              - not_null
          - name: OrderID
            description: "Foreign key to the order being shipped"
          - name: ShipDate
            description: "Date the shipment was dispatched"
          - name: DeliveryDate
            description: "Actual or expected delivery date"
          - name: Carrier
            description: "Shipping carrier name"
          - name: TrackingNumber
            description: "Carrier tracking number"
          - name: ShipmentStatus
            description: "Current shipment status"
          - name: ShippingCost
            description: "Cost of shipping"
          - name: Address
            description: "Shipping address"
          - name: City
            description: "Shipping city"
          - name: State
            description: "Shipping state"
          - name: Country
            description: "Shipping country"
          - name: PostalCode
            description: "Shipping postal code"

      - name: seed_raw_stores
        description: "Retail store locations"
        columns:
          - name: StoreID
            description: "Unique identifier for the store"
            tests:
              - unique
              - not_null
          - name: StoreName
            description: "Store name"
          - name: StoreType
            description: "Type of store (Flagship/Standard/Express/Warehouse)"
          - name: Address
            description: "Store street address"
          - name: City
            description: "Store city"
          - name: State
            description: "Store state/province"
          - name: Country
            description: "Store country"
          - name: PostalCode
            description: "Store postal code"
          - name: Phone
            description: "Store phone number"
          - name: ManagerName
            description: "Name of the store manager"
          - name: OpenDate
            description: "Date the store opened"
          - name: IsActive
            description: "Whether the store is currently active"

      - name: seed_raw_suppliers
        description: "Supplier/vendor master data"
        columns:
          - name: SupplierID
            description: "Unique identifier for the supplier"
            tests:
              - unique
              - not_null
          - name: SupplierName
            description: "Supplier company name"
          - name: ContactName
            description: "Primary contact person"
          - name: ContactEmail
            description: "Contact email address"
          - name: Phone
            description: "Contact phone number"
          - name: Address
            description: "Supplier address"
          - name: City
            description: "Supplier city"
          - name: State
            description: "Supplier state"
          - name: Country
            description: "Supplier country"
          - name: PostalCode
            description: "Supplier postal code"
          - name: IsActive
            description: "Whether the supplier is currently active"
