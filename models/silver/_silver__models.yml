version: 2

models:
  - name: stg_categories
    description: "Staging model for product categories. 1:1 with RAW.Categories seed data."
    columns:
      - name: CategoryID
        description: "Unique identifier for the category"
        tests:
          - unique
          - not_null
      - name: CategoryName
        description: "Name of the product category"
        tests:
          - not_null
      - name: IsActive
        description: "Whether the category is active (1) or inactive (0)"

  - name: stg_customers
    description: "Staging model for customer master data. 1:1 with RAW.Customers seed data."
    columns:
      - name: CustomerID
        description: "Unique identifier for the customer"
        tests:
          - unique
          - not_null
      - name: FirstName
        description: "Customer first name"
      - name: LastName
        description: "Customer last name"
      - name: Email
        description: "Customer email address"
      - name: DateOfBirth
        description: "Customer date of birth"
      - name: CustomerSegment
        description: "Customer segment classification (Regular/Premium/VIP)"
      - name: IsActive
        description: "Whether the customer account is active"

  - name: stg_employees
    description: "Staging model for employee master data. 1:1 with RAW.Employees seed data."
    columns:
      - name: EmployeeID
        description: "Unique identifier for the employee"
        tests:
          - unique
          - not_null
      - name: StoreID
        description: "Foreign key to the store where the employee works"
        tests:
          - not_null
      - name: HireDate
        description: "Date the employee was hired"
      - name: IsActive
        description: "Whether the employee is currently active"

  - name: stg_orders
    description: "Staging model for sales order headers. 1:1 with RAW.Orders seed data."
    columns:
      - name: OrderID
        description: "Unique identifier for the order"
        tests:
          - unique
          - not_null
      - name: CustomerID
        description: "Foreign key to the customer who placed the order"
        tests:
          - not_null
      - name: StoreID
        description: "Foreign key to the store where the order was placed"
        tests:
          - not_null
      - name: EmployeeID
        description: "Foreign key to the employee who processed the order"
        tests:
          - not_null
      - name: OrderDate
        description: "Date the order was placed"
        tests:
          - not_null
      - name: OrderStatus
        description: "Current order status"
      - name: OrderChannel
        description: "Sales channel (Online/InStore)"

  - name: stg_order_items
    description: "Staging model for order line items. 1:1 with RAW.OrderItems seed data."
    columns:
      - name: OrderItemID
        description: "Unique identifier for the order line item"
        tests:
          - unique
          - not_null
      - name: OrderID
        description: "Foreign key to the parent order"
        tests:
          - not_null
      - name: ProductID
        description: "Foreign key to the product"
        tests:
          - not_null
      - name: Quantity
        description: "Quantity ordered"
      - name: UnitPrice
        description: "Unit price at the time of sale"
      - name: LineTotal
        description: "Total line amount after discount"

  - name: stg_payments
    description: "Staging model for payment transactions. 1:1 with RAW.Payments seed data."
    columns:
      - name: PaymentID
        description: "Unique identifier for the payment"
        tests:
          - unique
          - not_null
      - name: OrderID
        description: "Foreign key to the order being paid"
        tests:
          - not_null
      - name: PaymentDate
        description: "Date the payment was processed"
      - name: PaymentMethod
        description: "Payment method used (CreditCard, DebitCard, Cash, etc.)"
      - name: Amount
        description: "Payment amount"

  - name: stg_products
    description: "Staging model for product master data. 1:1 with RAW.Products seed data."
    columns:
      - name: ProductID
        description: "Unique identifier for the product"
        tests:
          - unique
          - not_null
      - name: CategoryID
        description: "Foreign key to the category"
        tests:
          - not_null
      - name: SupplierID
        description: "Foreign key to the supplier"
        tests:
          - not_null
      - name: SKU
        description: "Stock keeping unit code"
      - name: UnitPrice
        description: "Current selling price"
      - name: CostPrice
        description: "Product cost price"

  - name: stg_shipments
    description: "Staging model for shipment tracking. 1:1 with RAW.Shipments seed data."
    columns:
      - name: ShipmentID
        description: "Unique identifier for the shipment"
        tests:
          - unique
          - not_null
      - name: OrderID
        description: "Foreign key to the order being shipped"
        tests:
          - not_null
      - name: ShippingCost
        description: "Cost of shipping"

  - name: stg_stores
    description: "Staging model for retail store locations. 1:1 with RAW.Stores seed data."
    columns:
      - name: StoreID
        description: "Unique identifier for the store"
        tests:
          - unique
          - not_null
      - name: StoreName
        description: "Store name"
        tests:
          - not_null
      - name: IsActive
        description: "Whether the store is currently active"

  - name: stg_suppliers
    description: "Staging model for supplier/vendor data. 1:1 with RAW.Suppliers seed data."
    columns:
      - name: SupplierID
        description: "Unique identifier for the supplier"
        tests:
          - unique
          - not_null
      - name: SupplierName
        description: "Supplier company name"
        tests:
          - not_null
      - name: IsActive
        description: "Whether the supplier is currently active"
