# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: "eastman_migration"
version: "1.0.0"

# This setting configures which "profile" dbt uses for this project.
profile: "eastman_migration"

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================================
# Model configurations — Medallion Architecture
# =============================================================================
models:
  eastman_migration:
    silver:
      +materialized: view
      +schema: silver
      +tags: ["silver", "staging"]

    gold:
      dimensions:
        +materialized: table
        +schema: gold
        +tags: ["gold", "dimension"]
      facts:
        +materialized: table
        +schema: gold
        +tags: ["gold", "fact"]

seeds:
  eastman_migration:
    +schema: raw
